# Leadership MCP — serviço HTTP atrás do Caddy existente no VPS.
#
# O Caddy (projeto docs-site) faz o TLS e valida o Bearer token, e encaminha para este
# container pela rede docker compartilhada. A porta NÃO é publicada no host — só o Caddy
# alcança o serviço pela rede interna.
services:
  leadership-mcp:
    build:
      context: ..
      dockerfile: Dockerfile
    image: leadership-mcp:latest
    container_name: leadership-mcp
    restart: unless-stopped
    environment:
      MCP_HTTP_PORT: 3000
      # Ref da base de conhecimento buscada do GitHub em runtime (fallback: cópia da imagem).
      LEADERSHIP_MCP_REF: main
    networks:
      - docs_net

networks:
  # Rede criada pelo projeto docs-site (Caddy). Marcada como external para reaproveitar.
  docs_net:
    external: true
    name: docs-site_docs_net
